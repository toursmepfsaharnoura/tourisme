<!DOCTYPE html>
<html>
<head>
    <title>Quick Form Test</title>
</head>
<body>
    <h1>Quick Form Test - Submit to see debug output</h1>
    
    <form action="http://localhost:3002/guide/create-plan" method="POST" enctype="multipart/form-data">
        <div>
            <label>Titre:</label>
            <input type="text" name="titre" value="Test Quick Fix" required>
        </div>
        
        <div>
            <label>Description:</label>
            <textarea name="description" required>Test description for quick fix</textarea>
        </div>
        
        <div>
            <label>Prix:</label>
            <input type="number" name="prix" value="150" required>
        </div>
        
        <div>
            <label>Max Participants:</label>
            <input type="number" name="max_participants" value="15" required>
        </div>
        
        <div>
            <label>Date Début:</label>
            <input type="date" name="date_debut" value="2026-04-15" required>
        </div>
        
        <div>
            <label>Date Fin:</label>
            <input type="date" name="date_fin" value="2026-04-20" required>
        </div>
        
        <div>
            <label>Gouvernorat:</label>
            <input type="number" name="id_gouvernorat" value="1" required>
        </div>
        
        <div>
            <label>Délégation:</label>
            <input type="number" name="id_delegation" value="1" required>
        </div>
        
        <div>
            <label>Lieux:</label>
            <select name="lieux[]" multiple required>
                <option value="1" selected>Lieu 1</option>
                <option value="2" selected>Lieu 2</option>
            </select>
        </div>
        
        <div>
            <label>Image (optional):</label>
            <input type="file" name="image">
        </div>
        
        <button type="submit">SUBMIT TEST FORM</button>
    </form>
    
    <p><strong>Instructions:</strong></p>
    <ol>
        <li>Fill the form (all fields are pre-filled)</li>
        <li>Click "SUBMIT TEST FORM"</li>
        <li>Check the server console for debug output</li>
        <li>You should see the form data in the console now!</li>
    </ol>
</body>
</html>
