<!DOCTYPE html>
<html>
<head>
    <title>Test Form Submission</title>
</head>
<body>
    <h1>Test Form Submission</h1>
    
    <form action="http://localhost:3002/guide/create-plan" method="POST" enctype="multipart/form-data">
        <div>
            <label>Titre:</label>
            <input type="text" name="titre" value="Test Plan" required>
        </div>
        
        <div>
            <label>Description:</label>
            <textarea name="description" required>Test description</textarea>
        </div>
        
        <div>
            <label>Prix:</label>
            <input type="number" name="prix" value="100" required>
        </div>
        
        <div>
            <label>Max Participants:</label>
            <input type="number" name="max_participants" value="20" required>
        </div>
        
        <div>
            <label>Date Début:</label>
            <input type="date" name="date_debut" value="2026-04-15" required>
        </div>
        
        <div>
            <label>Date Fin:</label>
            <input type="date" name="date_fin" value="2026-04-20" required>
        </div>
        
        <div>
            <label>Gouvernorat:</label>
            <input type="number" name="id_gouvernorat" value="1" required>
        </div>
        
        <div>
            <label>Délégation:</label>
            <input type="number" name="id_delegation" value="1" required>
        </div>
        
        <div>
            <label>Lieux:</label>
            <select name="lieux[]" multiple required>
                <option value="1" selected>Lieu 1</option>
                <option value="2" selected>Lieu 2</option>
            </select>
        </div>
        
        <div>
            <label>Image:</label>
            <input type="file" name="image">
        </div>
        
        <button type="submit">Submit Test Form</button>
    </form>
    
    <script>
        console.log('Test form loaded');
    </script>
</body>
</html>
