<!DOCTYPE html>
<html>
<head>
    <title>Form Submission Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { max-width: 500px; }
        div { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 8px; border: 1px solid #ccc; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>Form Submission Test</h1>
    <p>This form submits to /test-form to debug data transmission</p>
    
    <form action="http://localhost:3002/test-form" method="POST" enctype="multipart/form-data">
        <div>
            <label for="titre">Titre:</label>
            <input type="text" id="titre" name="titre" value="Test Plan" required>
        </div>
        
        <div>
            <label for="description">Description:</label>
            <textarea id="description" name="description" required>Test description</textarea>
        </div>
        
        <div>
            <label for="prix">Prix:</label>
            <input type="number" id="prix" name="prix" value="100" required>
        </div>
        
        <div>
            <label for="max_participants">Max Participants:</label>
            <input type="number" id="max_participants" name="max_participants" value="20" required>
        </div>
        
        <div>
            <label for="date_debut">Date Début:</label>
            <input type="date" id="date_debut" name="date_debut" value="2026-04-15" required>
        </div>
        
        <div>
            <label for="date_fin">Date Fin:</label>
            <input type="date" id="date_fin" name="date_fin" value="2026-04-20" required>
        </div>
        
        <div>
            <label for="id_gouvernorat">Gouvernorat:</label>
            <input type="number" id="id_gouvernorat" name="id_gouvernorat" value="1" required>
        </div>
        
        <div>
            <label for="id_delegation">Délégation:</label>
            <input type="number" id="id_delegation" name="id_delegation" value="1" required>
        </div>
        
        <div>
            <label for="lieux">Lieux (multiple):</label>
            <select id="lieux" name="lieux[]" multiple required>
                <option value="1" selected>Lieu 1</option>
                <option value="2" selected>Lieu 2</option>
                <option value="3">Lieu 3</option>
            </select>
        </div>
        
        <div>
            <label for="image">Image:</label>
            <input type="file" id="image" name="image">
        </div>
        
        <button type="submit">Submit Test Form (No Auth)</button>
    &nbsp;
    <button type="button" onclick="testWithAuth()">Submit Test Form (With Auth)</button>
    </form>
    
    <div id="result" style="margin-top: 20px; padding: 10px; background: #f0f0f0;"></div>
    
    <script>
        async function testWithAuth() {
            const formData = new FormData(document.querySelector('form'));
            
            try {
                const response = await fetch('http://localhost:3002/test-form', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                document.getElementById('result').innerHTML = `
                    <h3>Response (With Auth):</h3>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h3>Error (With Auth):</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }
        
        document.querySelector('form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            
            try {
                const response = await fetch('http://localhost:3002/test-form-no-auth', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                document.getElementById('result').innerHTML = `
                    <h3>Response (No Auth):</h3>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h3>Error (No Auth):</h3>
                    <pre>${error.message}</pre>
                `;
            }
        });
    </script>
</body>
</html>
